services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-onewiki}
      MYSQL_USER: ${MYSQL_USER:-onewiki}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-onewiki_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_root_password}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
  api:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-onewiki}:${MYSQL_PASSWORD:-onewiki_dev_password}@mysql:3306/${MYSQL_DATABASE:-onewiki}?charset=utf8mb4
      FILE_STORAGE_ROOT: /data/knowledge/storage
      AI_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - knowledge-files:/data/knowledge
    depends_on:
      mysql:
        condition: service_healthy
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mysql-data:
  knowledge-files:
